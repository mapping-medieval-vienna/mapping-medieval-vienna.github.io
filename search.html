<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suche – Mapping Medieval Vienna</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/search.css">
</head>
<body>

<header id="site-header">
  <span id="site-title">Mapping Medieval Vienna</span>
  <span id="header-sep"></span>
  <a href="index.html">← Übersicht</a>
</header>

<div id="search-layout">
  <main id="search-main">

    <h1 id="search-heading">Suche</h1>

    <form id="search-form" autocomplete="off">
      <div class="field-grid">

        <div class="field-group full-width">
          <label for="q-text">Freitext (von, an, Ort, Objekt)</label>
          <input type="search" id="q-text" placeholder="z.B. Munsser, Scheffstraße, DB1057">
        </div>

        <div class="field-group full-width">
          <label for="q-fuzzy">
            Freitext – unscharfe Suche
            <span class="fuzzy-tag">experimentell</span>
          </label>
          <input type="search" id="q-fuzzy" placeholder="z.B. hausfraw = hausfrau, pey = bei, Chunrat = Konrad">
        </div>

        <div class="field-group full-width person-group">
          <label for="q-person">Person</label>
          <div class="person-inputs">
            <input type="search" id="q-person" placeholder="Name">
            <select id="q-person-rolle">
              <option value="alle">alle Rollen</option>
              <option value="von">von</option>
              <option value="an">an</option>
              <option value="neben">neben</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <label for="q-objekt">Objekt</label>
          <input type="search" id="q-objekt" placeholder="Beschreibung oder ID, z.B. DB1057">
        </div>

        <div class="field-group">
          <label for="q-lage">Lage</label>
          <input type="search" id="q-lage" placeholder="Straße, Viertel …">
        </div>

        <div class="field-group year-range">
          <label>Zeitraum</label>
          <div class="year-inputs">
            <input type="number" id="q-year-from" value="1420" min="1420" max="1517">
            <span>–</span>
            <input type="number" id="q-year-to"   value="1517" min="1420" max="1517">
          </div>
        </div>

      </div>

      <div class="form-footer">
        <button type="submit" id="btn-search">Suchen</button>
        <button type="button" id="btn-reset">Zurücksetzen</button>
        <span id="result-count"></span>
      </div>
    </form>

    <div id="results"></div>

  </main>
</div>

<script src="js/search.js"></script>
</body>
</html>
